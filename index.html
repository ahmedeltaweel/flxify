      '.cm-lineNumbers .cm-gutterElement': { color: '#222222' },
      '.cm-activeLine': { backgroundColor: 'rgba(255, 255, 255, 0.02)' },
      '.cm-selectionBackground': { backgroundColor: 'rgba(0, 102, 255, 0.20) !important' },
      '&.cm-focused .cm-selectionBackground': { backgroundColor: 'rgba(0, 102, 255, 0.40) !important' },
      '.cm-content': { caretColor: '#0066ff' },
      '.cm-cursor': { borderLeftColor: '#0066ff' }
    }, { dark: true });
    const oledStealthHighlight = HighlightStyle.define([
      { tag: tags.keyword, color: '#0066ff' },
      { tag: tags.string, color: '#aaaaaa' },
      { tag: tags.number, color: '#888888' },
      { tag: tags.comment, color: '#333333', fontStyle: 'italic' },
      { tag: tags.propertyName, color: '#cccccc' },
      { tag: tags.variableName, color: '#e8e8e8' },
      { tag: tags.function(tags.variableName), color: '#4488ff' },
      { tag: tags.definition(tags.variableName), color: '#e8e8e8' },
      { tag: tags.typeName, color: '#5599ff' },
      { tag: tags.operator, color: '#666666' },
      { tag: tags.punctuation, color: '#555555' },
      { tag: tags.tagName, color: '#0066ff' },
      { tag: tags.attributeName, color: '#aaaaaa' },
      { tag: tags.attributeValue, color: '#888888' },
      { tag: tags.bool, color: '#0066ff' },
      { tag: tags.null, color: '#333333' },
      { tag: tags.regexp, color: '#4488ff' },
      { tag: tags.heading, color: '#ffffff', fontWeight: 'bold' },
      { tag: tags.link, color: '#0066ff', textDecoration: 'underline' },
    ]);
    window.flxifyOledStealthTheme = [oledStealthEditorTheme, syntaxHighlighting(oledStealthHighlight)];

    // Read saved theme preference
    const savedTheme = (() => {
      try { return localStorage.getItem('flxify-theme') || 'standard-dark'; } catch(e) { return 'standard-dark'; }
    })();

    // Language compartment for dynamic switching
    const languageConf = new Compartment();

    // Language detection — returns a string ID
    function detectLanguageId(text) {
      if (!text || text.trim().length === 0) return 'none';

      const trimmed = text.trim();

      // Markdown detection (check first — it can embed other languages)
      if (/^#{1,6}\s+\S/m.test(trimmed) && (/^```/m.test(trimmed) || /^[-*+]\s+\S/m.test(trimmed) || /\[.+\]\(.+\)/.test(trimmed) || /^>\s+\S/m.test(trimmed))) {
        return 'markdown';
      }

      // JSON detection — relaxed: looks for "key": patterns instead of requiring valid JSON.parse()
      if ((trimmed.startsWith('{') || trimmed.startsWith('[')) && (trimmed.endsWith('}') || trimmed.endsWith(']'))) {
        if (/"[\w$]+"(\s+)?:/.test(trimmed)) return 'json';
        try { JSON.parse(trimmed); return 'json'; } catch(e) { /* not valid JSON, continue */ }
      }

      // HTML/XML detection
      if (trimmed.startsWith('<!') || trimmed.startsWith('<?xml') || /<\w+[\s>]/.test(trimmed.substring(0, 200))) {
        if (trimmed.startsWith('<?xml') || (/<\w+[^>]*\/>/.test(trimmed) && !/<(html|div|span|p|a|body|head|script|style)\b/i.test(trimmed))) {
          return 'xml';
        }
        return 'html';
      }

      // SQL detection
      if (/^\s*(SELECT|INSERT|UPDATE|DELETE|CREATE|ALTER|DROP|WITH)\b/i.test(trimmed)) {
        return 'sql';
      }

      // Python detection
      if (/(^|\n)\s*(def\s+\w+\s*\(|class\s+\w+[\s(:]|from\s+\w+\s+import\s|import\s+\w+|elif\s|except(\s+\w+)?:)/.test(trimmed)) {
        return 'python';
      }

      // CSS detection — broadened with @font-face, @charset
      if (/^[\s\S]*\{[\s\S]*[\w-]+\s*:\s*[^;]+;/m.test(trimmed) && /^(@media|@import|@keyframes|@font-face|@charset|[.#\w\[\*:][\w\-\s,.#>\+~\[\]='"*:()]*\{)/m.test(trimmed)) {
        return 'css';
      }

      // TypeScript detection — JS patterns + type annotations
      if (/(^|\n)\s*(interface\s+\w+|type\s+\w+\s*=|<\w+>\s*\(|:\s*(string|number|boolean|void|any|never)\b)/.test(trimmed) &&
          /(^|\n)\s*(function\s+\w+|const\s+\w+|let\s+\w+|var\s+\w+|import\s+|export\s+|class\s+\w+|=>\s*\{)/.test(trimmed)) {
        return 'typescript';
      }

      // JavaScript detection
      if (/(^|\n)\s*(function\s+\w+|const\s+\w+|let\s+\w+|var\s+\w+|import\s+|export\s+|class\s+\w+|=>\s*\{)/.test(trimmed)) {
        return 'javascript';
      }

      // YAML detection — key: value lines (≥2) or --- separator
      if (!trimmed.startsWith('{') && (/^---\s*$/m.test(trimmed) || (trimmed.match(/^[\w][\w.-]*\s*:(\s+\S|$)/gm) || []).length >= 2)) {
        return 'yaml';
      }

      return 'none';
    }

    // Map string ID to CodeMirror language extension
    function languageExtension(id) {
      switch (id) {
        case 'json': return json();
        case 'html': return html();
        case 'xml': return xml();
        case 'sql': return sql();
        case 'css': return css();
        case 'javascript': return javascript();
        case 'typescript': return javascript({ typescript: true });
        case 'python': return python();
        case 'yaml': return yaml();
        case 'markdown': return markdown({ codeLanguages: languages });
        default: return [];
      }
    }

    // Debounce helper
    let detectTimeout = null;
    let currentLangId = 'none';

    function updateLanguage(view) {
      clearTimeout(detectTimeout);
      detectTimeout = setTimeout(() => {
        const text = view.state.doc.toString();
        const id = detectLanguageId(text);
        if (id !== currentLangId) {
          currentLangId = id;
          view.dispatch({
            effects: languageConf.reconfigure(id !== 'none' ? languageExtension(id) : [])
          });
        }
      }, 500);
    }

    // Hint visibility
    const hintEl = document.getElementById('editor-hint');

    function updateHintVisibility(doc) {
      if (doc.length === 0) {
        hintEl.classList.remove('hidden');
      } else {
        hintEl.classList.add('hidden');
      }
    }

    // localStorage persistence
    const STORAGE_KEY = 'flxify-editor-content';

    function loadSavedContent() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        return (typeof saved === 'string') ? saved : '';
      } catch (e) {
        console.warn('Could not read from localStorage:', e);
        return '';
      }
    }

    let saveTimeout = null;

    function saveContent(text) {
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(() => {
        try {
          localStorage.setItem(STORAGE_KEY, text);
        } catch (e) {
          console.warn('Could not save to localStorage:', e);
        }
      }, 300);
    }

    const savedContent = loadSavedContent();

    // Create the editor
    const editorParent = document.getElementById('editor');

    const startState = EditorState.create({
      doc: savedContent,
      extensions: [
        history(),
        bracketMatching(),
        syntaxHighlighting(defaultHighlightStyle, { fallback: true }),
        themeConf.of([darkEditorTheme]),
        lineNumbers(),
        languageConf.of([]),
        keymap.of([...defaultKeymap, ...historyKeymap]),
        EditorView.updateListener.of((update) => {
          if (update.docChanged) {
            updateLanguage(update.view);
            updateHintVisibility(update.state.doc);
            saveContent(update.state.doc.toString());
          }
        }),
        EditorView.theme({
          '&': {
            height: '100%'
          },
          '.cm-scroller': {
            fontFamily: "'SF Mono', 'Fira Code', 'Consolas', 'Monaco', 'Menlo', monospace",
            fontSize: '14px',
            lineHeight: '1.6',
            padding: '16px 0',
            overflow: 'auto'
          },
          '.cm-content': {
            padding: '0 24px'
          },
          '.cm-lineNumbers .cm-gutterElement': {
            fontSize: '13px',
            minWidth: '40px',
            textAlign: 'right'
          },
          '&.cm-focused': {
            outline: 'none'
          }
        }),
        EditorView.lineWrapping,
      ]
    });

    const cmEditor = new EditorView({
      state: startState,
      parent: editorParent,
    });

    // Expose to global scope for app.js
    window.cmEditor = cmEditor;

    // Initialize state for restored content
    if (savedContent.length > 0) {
      updateHintVisibility(cmEditor.state.doc);
      updateLanguage(cmEditor);
    }

    // Focus the editor on load
    cmEditor.focus();

    // Expose theme compartment and all themes for app.js theme switcher
    window.flxifyThemeConf = themeConf;
    window.flxifyLightTheme = [lightEditorTheme, syntaxHighlighting(defaultHighlightStyle)];
    window.flxifyDarkTheme = [darkEditorTheme];

    // Update hint text for mobile
    const isMobile = window.matchMedia('(max-width: 768px)').matches;
    const hintShortcut = document.getElementById('hint-shortcut-key');
    if (isMobile && hintShortcut) {
      hintShortcut.textContent = 'menu';
      hintShortcut.parentElement.innerHTML = 'Tap the <kbd>menu</kbd> button to open the command palette';
    }

    // Signal that CodeMirror is ready
    window.cmReady = true;
    window.dispatchEvent(new Event('cm-ready'));

    // ── Font family & size controls ──

    var FONT_STORAGE_KEY = 'flxify-font';
    var FONT_SIZE_STORAGE_KEY = 'flxify-font-size';
    var FONT_MIN = 10;
    var FONT_MAX = 24;

    // Read persisted values (set by anti-FOUC script in head, or defaults)
    var currentFont = (function() {
      try { return localStorage.getItem(FONT_STORAGE_KEY) || ''; } catch(e) { return ''; }
    })();
    var currentFontSize = (function() {
      var v = parseInt(localStorage.getItem(FONT_SIZE_STORAGE_KEY), 10);
      return (v >= FONT_MIN && v <= FONT_MAX) ? v : 14;
    })();

    // Apply font to CodeMirror editor
    function applyEditorFont(fontFamily, fontSize) {
      var scroller = cmEditor.scrollDOM;
      // scrollDOM is the .cm-scroller element — setting style here overrides the
      // static EditorView.theme() rule without needing a full CM dispatch
      scroller.style.fontFamily = fontFamily
        ? fontFamily + ", 'SF Mono', 'Consolas', monospace"
        : "'SF Mono', 'Fira Code', 'Consolas', 'Monaco', 'Menlo', monospace";
      scroller.style.fontSize = fontSize + 'px';
      // Also update the CSS variable so it's available to any other consumers
      document.documentElement.style.setProperty('--editor-font-family', scroller.style.fontFamily);
      document.documentElement.style.setProperty('--editor-font-size', fontSize + 'px');
    }

    // Persist & apply font family choice
    function setFont(fontValue, fontLabel) {
      currentFont = fontValue;
      try { localStorage.setItem(FONT_STORAGE_KEY, fontValue); } catch(e) {}
      applyEditorFont(currentFont, currentFontSize);
      // Update active state on options
      document.querySelectorAll('.font-option').forEach(function(btn) {
        btn.classList.toggle('active', btn.dataset.font === fontValue);
      });
    }

    // Persist & apply font size change
    function setFontSize(size) {
      size = Math.max(FONT_MIN, Math.min(FONT_MAX, size));
      currentFontSize = size;
      try { localStorage.setItem(FONT_SIZE_STORAGE_KEY, size); } catch(e) {}
      applyEditorFont(currentFont, currentFontSize);
      var displayEl = document.getElementById('font-size-display');
      if (displayEl) displayEl.textContent = size + 'px';
    }

    // Apply persisted values immediately (editor just initialised)
    applyEditorFont(currentFont, currentFontSize);

    // Sync active state for the persisted font choice
    (function() {
      document.querySelectorAll('.font-option').forEach(function(btn) {
        if (btn.dataset.font === currentFont) {
          btn.classList.add('active');
        }
      });
      var displayEl = document.getElementById('font-size-display');
      if (displayEl) displayEl.textContent = currentFontSize + 'px';
    })();

    // ── Settings panel toggle ──
    var settingsToggleBtn = document.getElementById('settings-toggle');
    var settingsDropdown = document.getElementById('settings-dropdown');
    var settingsPanel = document.getElementById('settings-panel');

    if (settingsToggleBtn && settingsDropdown) {
      settingsToggleBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        settingsDropdown.classList.toggle('open');
      });

      document.addEventListener('click', function(e) {
        if (settingsPanel && !settingsPanel.contains(e.target)) {
          settingsDropdown.classList.remove('open');
        }
      });
    }

    // Font option clicks
    document.querySelectorAll('.font-option').forEach(function(btn) {
      btn.addEventListener('click', function() {
        setFont(btn.dataset.font, btn.dataset.label);
        // keep settings panel open so users can continue adjusting
      });
    });

    // Font size buttons
    var fontSizeDecBtn = document.getElementById('font-size-dec');
    var fontSizeIncBtn = document.getElementById('font-size-inc');

    if (fontSizeDecBtn) {
      fontSizeDecBtn.addEventListener('click', function() {
        setFontSize(currentFontSize - 1);
      });
    }
    if (fontSizeIncBtn) {
      fontSizeIncBtn.addEventListener('click', function() {
        setFontSize(currentFontSize + 1);
      });
    }
  </script>
  <script defer src="app.js"></script>
</body>
</html>
